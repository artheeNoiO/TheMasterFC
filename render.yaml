databases:
  - name: the-socker-manager-db
    plan: basic-256mb
    postgresMajorVersion: 16

services:
  - type: web
    name: the-socker-manager-api
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install && npx prisma generate --schema=prisma/schema.postgresql.prisma && npx prisma db push --schema=prisma/schema.postgresql.prisma
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: the-socker-manager-db
          property: connectionString
      - key: CLIENT_URL
        value: https://www.themasterfc.com
      - key: CORS_ORIGINS
        value: https://www.themasterfc.com,https://themasterfc.com
      - key: CRON_SECRET
        generateValue: true
      # ต้องตั้งค่าเองใน Render dashboard ให้ "ตรงกับ" AUTH_TOKEN_SECRET ที่ตั้งไว้ใน Cloudflare Pages
      # (client/functions ใช้เซ็น/verify token ด้วยคีย์เดียวกันนี้ — ถ้าไม่ตรงกัน login จะพังทั้งระบบ)
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: GAME_PROVISION_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # Stake League — ยิง tick ทุก 10 นาที (สำรองกรณี in-process interval ของ web ไม่ทำงาน)
  - type: cron
    name: stake-tick
    runtime: node
    schedule: "*/10 * * * *"
    rootDir: server
    buildCommand: npm install
    startCommand: node -e "fetch(process.env.API_URL+'/api/cron/stake-tick',{method:'POST',headers:{'x-cron-secret':process.env.CRON_SECRET}}).then(r=>r.text()).then(console.log).catch(console.error)"
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: the-socker-manager-api
          property: host
      - key: CRON_SECRET
        fromService:
          type: web
          name: the-socker-manager-api
          envVarKey: CRON_SECRET

  - type: cron
    name: day-tick
    runtime: node
    # backup — in-process tick ทุก ~96 นาที (15 นัด/24ชม.) เป็นหลัก; throttle กันซ้ำ
    schedule: "0 * * * *"
    rootDir: server
    buildCommand: npm install
    startCommand: node -e "fetch(process.env.API_URL+'/api/cron/day-tick',{method:'POST',headers:{'x-cron-secret':process.env.CRON_SECRET}}).then(r=>r.text()).then(console.log).catch(console.error)"
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: the-socker-manager-api
          property: host
      - key: CRON_SECRET
        fromService:
          type: web
          name: the-socker-manager-api
          envVarKey: CRON_SECRET
